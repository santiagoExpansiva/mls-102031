collab-sticky-notification {
  display: block;
  transition: height 0.5s ease;
  position: relative;
  overflow: hidden;
  height: 0;
}
collab-sticky-notification.open {
  height: 50px;
}
collab-sticky-notification.information {
  background-color: #c5c9e6;
}
collab-sticky-notification.information .text-message,
collab-sticky-notification.information .icon-type {
  color: #007bff !important;
}
collab-sticky-notification.error {
  background-color: #f1d9d9;
}
collab-sticky-notification.error .text-message,
collab-sticky-notification.error .icon-type {
  color: #dc3545 !important;
}
collab-sticky-notification.alert {
  background-color: #e8ddbd59;
}
collab-sticky-notification.alert .text-message,
collab-sticky-notification.alert .icon-type {
  color: #ffc107 !important;
}
collab-sticky-notification > div {
  display: flex;
  height: 100%;
  gap: 1rem;
  align-items: center;
  padding: 0 0.5rem;
}
collab-sticky-notification > div .text-message {
  font-size: 18px;
  font-weight: bold;
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
collab-sticky-notification .close-icon {
  cursor: pointer;
}
collab-sticky-notification .controllers {
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
collab-sticky-notification .controllers i {
  cursor: pointer;
}
collab-nav-1 {
  position: relative;
  display: block;
  height: 30px;
}
collab-nav-1 nav {
  background-color: var(--collab-nav-bg-1);
  display: flex!important;
  height: 30px;
}
collab-nav-1 nav nav-1-notification {
  position: relative;
  margin-left: auto;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  font-style: normal;
  cursor: pointer;
  margin-right: 1rem;
}
collab-nav-1 nav nav-1-notification.enabled {
  pointer-events: all;
  cursor: pointer;
}
collab-nav-1 nav nav-1-notification.disabled {
  cursor: not-allowed;
  color: #cecece;
  pointer-events: none;
}
collab-nav-1 nav nav-1-notification:before {
  content: attr(data-count);
  position: absolute;
  top: 0px;
  right: -8px;
  background-color: red;
  color: white;
  border-radius: 50%;
  width: 6px;
  height: 6px;
  padding: 5px;
  font-size: 7px;
  text-align: center;
  display: none;
}
collab-nav-1 nav nav-1-notification[data-count="0"]:before {
  display: none;
}
collab-nav-1 nav nav-1-notification[data-count]:not([data-count="0"]):before {
  display: flex;
  align-items: center;
}
collab-nav-1 nav nav-1-item {
  user-select: none;
  padding: 0rem 0.8rem;
  color: var(--collab-nav-color);
  background-color: var(--collab-nav-bg-1);
  border-top-left-radius: 0.25rem;
  border-top-right-radius: 0.25rem;
  text-decoration: none;
  cursor: pointer;
  line-height: 1;
  font-family: FontAwesome;
  font-size: 12px;
  text-rendering: auto;
  -webkit-font-smoothing: antialiased;
  display: flex;
  align-items: center;
}
collab-nav-1 nav nav-1-item.enabled {
  pointer-events: all;
  cursor: pointer;
}
collab-nav-1 nav nav-1-item.disabled {
  cursor: not-allowed;
  color: #cecece;
  pointer-events: none;
}
collab-nav-1 nav nav-1-item.active {
  color: var(--collab-nav-color-active) !important;
  background: linear-gradient(360deg, var(--collab-nav-bg-2) 0%, var(--collab-nav-bg-1) 100%);
}
collab-nav-1 nav nav-1-item:hover {
  background: linear-gradient(360deg, var(--collab-nav-bg-2) 0%, var(--collab-nav-bg-1) 100%);
  text-decoration: none;
}
collab-nav-1 nav nav-1-item .additional-container {
  display: flex;
  align-items: center;
}
collab-nav-1 nav nav-1-item .additional-text {
  margin-right: 1rem;

  font-size: 12px;

collab-nav-1 nav nav-1-item .additional-img {
  margin-right: 0.2rem;

collab-nav-1 nav nav-1-item .avatar {

collab-spliter {
  display: flex;
  width: 100%;
  height: calc(100% - 30px);

collab-spliter {
  display: flex;
  flex: 1;
}
collab-spliter .hidden collab-spliter-item {
  display: none;
}
collab-spliter .spliter-separator {
  position: relative;
  background-color: var(--collab-nav-bg-2);
  display: flex;
  justify-content: center;
  align-items: baseline;
  min-width: 8px;
  cursor: e-resize;
  padding-top: 5px;
}
collab-spliter .spliter-separator > div {
  position: relative;
  background: var(--collab-nav-color-active);
  width: 2px;
  height: 28px;
  cursor: e-resize;
}
collab-spliter .spliter-separator > div::after {
  content: "";
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 3px;
  left: 2px;
  height: 10px;
  z-index: 999;
  background: var(--collab-nav-color-active);
}
collab-spliter .spliter-separator > div::before {
  content: "";
  position: absolute;
  top: 50%;
  right: 2px;
  transform: translateY(-50%);
  width: 3px;
  height: 10px;
  z-index: 999;
  background: var(--collab-nav-color-active);
}
collab-spliter .spliter-separator > span {
  display: flex;
  justify-content: center;
  gap: 0.1rem;
}
collab-spliter-item {
  display: block;
  width: 100%;
}
